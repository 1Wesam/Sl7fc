<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>SL7 FC</title>

<style>
body{
    margin:0;
    font-family:Arial, sans-serif;
    background:#080808;
    color:white;
}

header{
    text-align:center;
    padding:40px;
    background:linear-gradient(#0b7d3b,#050505);
}

.logo{
    width:130px;
    height:130px;
    background:white;
    border-radius:50%;
    margin:auto;
    display:flex;
    align-items:center;
    justify-content:center;
    color:#0b7d3b;
    font-size:40px;
    font-weight:bold;
}

h1{
    font-size:45px;
    margin:20px 0 5px;
}

.subtitle{
    font-size:20px;
}

section{
    padding:40px 20px;
}

.title{
    text-align:center;
    color:#19b45b;
    font-size:35px;
    margin-bottom:30px;
}

.players{
    display:flex;
    justify-content:center;
    flex-wrap:wrap;
    gap:20px;
}

.card{
    background:#171717;
    width:220px;
    padding:20px;
    border-radius:20px;
    text-align:center;
}

.player-img{
    width:120px;
    height:120px;
    border-radius:50%;
    background:#333;
    margin:auto;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:45px;
}

.number{
    color:#19b45b;
    font-size:25px;
}

footer{
    background:#000;
    padding:20px;
    text-align:center;
}
</style>

</head>

<body>

<header>

<div class="logo">
SL7
</div>

<h1>SL7 FC</h1>

<p class="subtitle">
الموقع الرسمي للنادي
</p>

</header>


<section>

<h2 class="title">
الفريق الأول
</h2>


<div class="players">


<div class="card">
<div class="player-img">⚽</div>
<h2>وسام</h2>
<p>صانع ألعاب</p>
<div class="number">10</div>
</div>


<div class="card">
<div class="player-img">⚽</div>
<h2>بسام</h2>
<p>مهاجم</p>
<div class="number">9</div>
</div>


<div class="card">
<div class="player-img">⚽</div>
<h2>الشهري</h2>
<p>وسط</p>
<div class="number">8</div>
</div>


<div class="card">
<div class="player-img">⚽</div>
<h2>خلاف</h2>
<p>مدافع</p>
<div class="number">4</div>
</div>


<div class="card">
<div class="player-img">⚽</div>
<h2>ونجا</h2>
<p>جناح</p>
<div class="number">7</div>
</div>


</div>

</section>


<footer>
© SL7 FC
</footer>


</body>
</html>
